name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  CI: true
  FORCE_COLOR: '1'

jobs:
  quality-gate:
    name: Quality Gate (lint + typecheck + browser smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci

      - name: Fix cross-platform optional binaries
        run: npm i --no-save @typescript/native-preview-linux-x64@7.0.0-dev.20260120.1

      - name: Fix Linux Biome optional binary
        run: npm i --no-save @biomejs/cli-linux-x64@2.3.5

      - name: Run quality checks
        run: npm run check:ci

  workspace-tests:
    name: Workspace Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fix cross-platform optional binaries
        run: npm i --no-save @typescript/native-preview-linux-x64@7.0.0-dev.20260120.1

      - name: Run tests
        run: npm test

  monorepo-build:
    name: Monorepo Build
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Fix cross-platform optional binaries
        run: npm i --no-save @typescript/native-preview-linux-x64@7.0.0-dev.20260120.1

      - name: Build all packages
        run: npm run build

  moros-build:
    name: Moros Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality-gate
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Fix cross-platform optional binaries
        if: runner.os == 'Linux'
        run: npm i --no-save @typescript/native-preview-linux-x64@7.0.0-dev.20260120.1

      - name: Build Moros package
        run: npm run build
        working-directory: packages/Moros

      - name: Run Moros tests
        run: npm test
        working-directory: packages/Moros

      - name: Upload Moros build artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: moros-dist-${{ matrix.os }}
          path: |
            packages/Moros/dist
            packages/Moros/dist/server
          if-no-files-found: ignore

  moros-e2e-smoke:
    name: Moros E2E Smoke
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Fix cross-platform optional binaries
        run: npm i --no-save @typescript/native-preview-linux-x64@7.0.0-dev.20260120.1

      - name: Build Moros
        run: npm run build
        working-directory: packages/Moros

      - name: Run Moros E2E smoke tests
        run: xvfb-run -a npm --prefix packages/Moros run test:e2e
